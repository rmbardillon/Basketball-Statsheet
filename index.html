<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Basketball Stats</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏀</text></svg>">
    <link href="bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container py-2">
        <h2 class="text-center mb-2">🏀Rose Pointe Basketball</h2>
        <div class="text-center mb-2">
            <button class="btn btn-success" onclick="exportCSV()">📊 Export Summary CSV</button>
        </div>

        <div class="team-section">
            <div class="card shadow-sm mb-2">
                <div class="card-header text-white" id="home-header">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <div class="d-flex align-items-center gap-3">
                                <input class="form-control form-control-lg fw-bold" id="home-name" value="HOME TEAM" onchange="updateTeamColor('home')">
                                <span class="fs-2 fw-bold" id="home-score">0</span>
                            </div>
                        </div>
                        <div class="col-md-6 text-end mt-2 mt-md-0">
                            <select class="form-select" id="home-select" onchange="loadTeam('home')">
                                <option value="">Select Team</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped mb-0" id="home-stats">
                            <thead class="table-dark">
                                <tr>
                                    <th>Starting five</th>
                                    <th>Number</th>
                                    <th>Player Name</th>
                                    <th>Points</th>
                                    <th>Rebounds</th>
                                    <th>Assists</th>
                                    <th>Steals</th>
                                    <th>Blocks</th>
                                    <th>3 Pointers</th>
                                    <th>Fouls</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="team-section">
            <div class="card shadow-sm mb-2">
                <div class="card-header text-white" id="away-header">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <div class="d-flex align-items-center gap-3">
                                <input class="form-control form-control-lg fw-bold" id="away-name" value="AWAY TEAM" onchange="updateTeamColor('away')">
                                <span class="fs-2 fw-bold" id="away-score">0</span>
                            </div>
                        </div>
                        <div class="col-md-6 text-end mt-2 mt-md-0">
                            <select class="form-select" id="away-select" onchange="loadTeam('away')">
                                <option value="">Select Team</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped mb-0" id="away-stats">
                            <thead class="table-dark">
                                <tr>
                                    <th>Starting five</th>
                                    <th>Number</th>
                                    <th>Player Name</th>
                                    <th>Points</th>
                                    <th>Rebounds</th>
                                    <th>Assists</th>
                                    <th>Steals</th>
                                    <th>Blocks</th>
                                    <th>3 Pointers</th>
                                    <th>Fouls</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
