<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Basketball Stats</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏀</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container-fluid py-4">
        <h2 class="text-center mb-4">🏀Rose Pointe Basketball</h2>
        <div class="text-center mb-4">
            <button class="btn btn-success btn-lg" onclick="exportCSV()">📊 Export Summary CSV</button>
        </div>

        <div class="team-section">
            <div class="card shadow-sm mb-4">
                <div class="card-header text-white" id="home-header">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <input class="form-control form-control-lg fw-bold" id="home-name" value="HOME TEAM" onchange="updateTeamColor('home')">
                        </div>
                        <div class="col-md-6 text-end mt-2 mt-md-0">
                            <input type="file" id="home-upload" accept=".csv" style="display:none" onchange="uploadCSV('home')">
                            <button class="btn btn-light" onclick="document.getElementById('home-upload').click()">📁 Upload CSV</button>
                        </div>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped mb-0" id="home-stats">
                            <thead class="table-dark">
                                <tr>
                                    <th>Number</th>
                                    <th>Player Name</th>
                                    <th>Fouls</th>
                                    <th>Points</th>
                                    <th>Rebounds</th>
                                    <th>Assists</th>
                                    <th>Steals</th>
                                    <th>Blocks</th>
                                    <th>3 Pointers</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="team-section">
            <div class="card shadow-sm mb-4">
                <div class="card-header text-white" id="away-header">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <input class="form-control form-control-lg fw-bold" id="away-name" value="AWAY TEAM" onchange="updateTeamColor('away')">
                        </div>
                        <div class="col-md-6 text-end mt-2 mt-md-0">
                            <input type="file" id="away-upload" accept=".csv" style="display:none" onchange="uploadCSV('away')">
                            <button class="btn btn-light" onclick="document.getElementById('away-upload').click()">📁 Upload CSV</button>
                        </div>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped mb-0" id="away-stats">
                            <thead class="table-dark">
                                <tr>
                                    <th>Number</th>
                                    <th>Player Name</th>
                                    <th>Fouls</th>
                                    <th>Points</th>
                                    <th>Rebounds</th>
                                    <th>Assists</th>
                                    <th>Steals</th>
                                    <th>Blocks</th>
                                    <th>3 Pointers</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
